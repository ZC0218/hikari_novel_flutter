name: Build Unsigned IPA
run-name: Build Flutter Unsigned IPA
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: # 支持手动在网页触发构建

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: 检出代码仓库
        uses: actions/checkout@v4

      - name: 配置 Flutter 环境
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0' # 可自行修改适配项目的Flutter版本
          cache: true

      - name: 安装 CocoaPods 依赖
        run: |
          cd ios
          pod install --repo-update

      - name: Flutter 清理缓存
        run: flutter clean

      - name: 获取项目依赖
        run: flutter pub get

      - name: 编译未签名 IPA
        run: |
          # --no-codesign 生成无签名IPA，仅用于测试分发，无法直接安装真机
          flutter build ipa --no-codesign --release
          ls -la build/ios/ipa/

      - name: 上传 IPA 制品到工作流
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-ipa-file
          path: build/ios/ipa/*.ipa
          retention-days: 30
