name: Build Unsigned IPA (Flutter 3.38.7)
run-name: 编译无签名IPA | Flutter 3.38.7 Stable
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build_ios_unsigned:
    runs-on: macos-latest
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 安装 Flutter 3.38.7 Stable
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.7'
          channel: stable
          cache: true

      - name: 自动切换Xcode 16
        run: |
          XCODE_PATH=$(find /Applications -name "Xcode*.app" -maxdepth 1 | grep -E "Xcode.*16" | head -1)
          if [ -z "$XCODE_PATH" ]; then
            echo "未找到Xcode16，使用系统默认Xcode"
          else
            sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
            echo "已切换至 $XCODE_PATH"
          fi
          xcodebuild -version

      - name: Flutter环境校验
        run: flutter doctor -v

      - name: 清理项目缓存
        run: flutter clean

      - name: 拉取pub依赖
        run: flutter pub get

      - name: 安装iOS Pod依赖
        run: |
          cd ios
          pod repo update
          pod install --verbose

      # 仅生成xcarchive归档，不尝试自动导出ipa
      - name: 构建无签名Xcode归档包
        run: flutter build ipa --release --no-codesign

      # 核心修复：手动组装无签名IPA，绕过exportArchive Team校验
      - name: 手动组装未签名IPA
        run: |
          # 创建目录结构
          mkdir -p build/ios/tmp/Payload
          # 从归档包拷贝App文件
          cp -r build/ios/archive/Runner.xcarchive/Products/Applications/Runner.app build/ios/tmp/Payload/
          # 进入临时目录压缩为ipa
          cd build/ios/tmp
          zip -qr unsigned-hikari-novel.ipa Payload
          # 移动到ipa输出目录
          mkdir -p ../ipa
          mv unsigned-hikari-novel.ipa ../ipa/
          cd ../../../

      - name: 查看生成IPA文件
        run: ls -lh build/ios/ipa/

      - name: 上传未签名IPA文件
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-hikari-novel-ipa-flutter3.38.7
          path: build/ios/ipa/*.ipa
          retention-days: 30
