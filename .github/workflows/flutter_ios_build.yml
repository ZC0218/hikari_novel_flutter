name: Build Unsigned IPA (Flutter 3.38.7)
run-name: 编译无签名IPA | Flutter 3.38.7 Stable
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: # 支持网页手动触发构建

jobs:
  build_ios_unsigned:
    runs-on: macos-latest
    steps:
      # 1. 拉取仓库全部源码
      - name: 检出仓库代码
        uses: actions/checkout@v4

      # 2. 配置对应版本Flutter（匹配作者本地3.38.7 stable）
      - name: 安装 Flutter 3.38.7 Stable
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.7'
          channel: stable
          cache: true

      # 强制切换Xcode 16.4，适配device_info_plus 12.4.0所需iOS18 SDK
      - name: 指定Xcode 16.4
        run: sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer

      # 3. 校验完整Flutter环境
      - name: Flutter环境校验
        run: flutter doctor -v

      # 4. 清理缓存 + 拉取项目依赖（自动生成ios/Podfile）
      - name: 清理项目缓存
        run: flutter clean

      - name: 拉取pub依赖，生成iOS工程文件
        run: flutter pub get

      # 5. 安装CocoaPods
      - name: 安装iOS Pod依赖
        run: |
          cd ios
          pod repo update
          pod install --verbose

      # 6. 构建未签名IPA，移除所有不兼容参数
      - name: 构建未签名Release IPA
        run: flutter build ipa --release --no-codesign

      # 7. 打印构建产物目录
      - name: 查看生成IPA文件
        run: ls -lh build/ios/ipa/

      # 8. 上传IPA到工作流制品
      - name: 上传未签名IPA文件
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-hikari-novel-ipa-flutter3.38.7
          path: build/ios/ipa/*.ipa
          retention-days: 30
