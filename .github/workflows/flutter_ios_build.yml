name: Build Unsigned IPA (Flutter 3.38.7)
run-name: 编译无签名IPA | Flutter 3.38.7 Stable
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build_ios_unsigned:
    runs-on: macos-latest
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 安装 Flutter 3.38.7 Stable
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.7'
          channel: stable
          cache: true

      - name: 自动切换Xcode 16
        run: |
          XCODE_PATH=$(find /Applications -name "Xcode*.app" -maxdepth 1 | grep -E "Xcode.*16" | head -1)
          if [ -z "$XCODE_PATH" ]; then
            echo "未找到Xcode16，使用系统默认Xcode"
          else
            sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
            echo "已切换至 $XCODE_PATH"
          fi
          xcodebuild -version

      - name: Flutter环境校验
        run: flutter doctor -v

      - name: 清理项目缓存
        run: flutter clean

      - name: 拉取pub依赖
        run: flutter pub get

      # 只修改Podfile的iOS版本号，不改动post_install结构
      - name: 修改Podfile最低版本并安装依赖
        run: |
          cd ios
          # 仅修改全局最低iOS版本为13.0，不动其他结构
          sed -i '' 's/platform :ios, .*/platform :ios, "13.0"/' Podfile
          pod repo update
          pod install --verbose

      # 核心修复：pod install后，直接批量修改Pods项目的编译配置
      - name: 批量修正Pods项目编译设置
        run: |
          cd ios
          
          # 批量替换所有Pod的最低部署版本为13.0
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 9.0;/IPHONEOS_DEPLOYMENT_TARGET = 13.0;/g' Pods/Pods.xcodeproj/project.pbxproj
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 10.0;/IPHONEOS_DEPLOYMENT_TARGET = 13.0;/g' Pods/Pods.xcodeproj/project.pbxproj
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 11.0;/IPHONEOS_DEPLOYMENT_TARGET = 13.0;/g' Pods/Pods.xcodeproj/project.pbxproj
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 12.0;/IPHONEOS_DEPLOYMENT_TARGET = 13.0;/g' Pods/Pods.xcodeproj/project.pbxproj
          
          # 批量设置Swift版本为5.0
          sed -i '' 's/SWIFT_VERSION = 4.0;/SWIFT_VERSION = 5.0;/g' Pods/Pods.xcodeproj/project.pbxproj
          sed -i '' 's/SWIFT_VERSION = 4.2;/SWIFT_VERSION = 5.0;/g' Pods/Pods.xcodeproj/project.pbxproj
          sed -i '' 's/SWIFT_VERSION = 5.0;/SWIFT_VERSION = 5.0;/g' Pods/Pods.xcodeproj/project.pbxproj
          
          # 批量禁用所有Pod的签名
          sed -i '' 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' Pods/Pods.xcodeproj/project.pbxproj
          
          echo "Pods项目配置修正完成"

      # Xcode编译，全量参数覆盖
      - name: Xcode编译无签名真机App
        run: |
          cd ios
          xcodebuild \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -destination generic/platform=iOS \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            IPHONEOS_DEPLOYMENT_TARGET=13.0 \
            SWIFT_VERSION=5.0 \
            GCC_TREAT_WARNINGS_AS_ERRORS=NO \
            SWIFT_TREAT_WARNINGS_AS_ERRORS=NO \
            ENABLE_BITCODE=NO \
            build

      # 手动组装标准无签名IPA
      - name: 打包IPA
        run: |
          mkdir -p build/ios/tmp/Payload
          cp -r ios/build/Release-iphoneos/Runner.app build/ios/tmp/Payload/
          cd build/ios/tmp
          zip -qr unsigned-hikari-novel.ipa Payload
          mkdir -p ../ipa
          mv unsigned-hikari-novel.ipa ../ipa/
          cd ../../../

      - name: 查看生成IPA文件
        run: ls -lh build/ios/ipa/

      - name: 上传未签名IPA文件
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-hikari-novel-ipa-flutter3.38.7
          path: build/ios/ipa/*.ipa
          retention-days: 30
