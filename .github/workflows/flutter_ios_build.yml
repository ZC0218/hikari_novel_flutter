name: Build Unsigned IPA (Flutter 3.38.7)
run-name: 编译无签名IPA | Flutter 3.38.7 Stable
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build_ios_unsigned:
    runs-on: macos-latest
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 安装 Flutter 3.38.7 Stable
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.7'
          channel: stable
          cache: true

      - name: 自动切换Xcode 16
        run: |
          XCODE_PATH=$(find /Applications -name "Xcode*.app" -maxdepth 1 | grep -E "Xcode.*16" | head -1)
          if [ -z "$XCODE_PATH" ]; then
            echo "未找到Xcode16，使用系统默认Xcode"
          else
            sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
            echo "已切换至 $XCODE_PATH"
          fi
          xcodebuild -version

      - name: Flutter环境校验
        run: flutter doctor -v

      - name: 清理项目缓存
        run: flutter clean

      - name: 拉取pub依赖
        run: flutter pub get

      - name: 安装iOS Pod依赖
        run: |
          cd ios
          pod repo update
          pod install --verbose

      # 编译模拟器版本App（无需Team、无需证书，不会触发团队校验）
      - name: 编译iOS模拟器App
        run: flutter build ios --simulator --release

      # 1. 创建IPA标准目录结构
      # 2. 复制模拟器App
      # 3. 剥离x86_64模拟器架构，仅保留arm64真机架构
      # 4. 压缩为无签名IPA
      - name: 剥离模拟器架构，生成无签名IPA
        run: |
          mkdir -p build/ios/tmp/Payload
          cp -r build/ios/Build/Products/Release-iphonesimulator/Runner.app build/ios/tmp/Payload/
          # 移除模拟器x86_64架构，仅保留arm64真机架构
          lipo -remove x86_64 build/ios/tmp/Payload/Runner.app/Runner -output build/ios/tmp/Payload/Runner.app/Runner
          cd build/ios/tmp
          zip -qr unsigned-hikari-novel.ipa Payload
          mkdir -p ../ipa
          mv unsigned-hikari-novel.ipa ../ipa/
          cd ../../../

      - name: 查看生成IPA文件
        run: ls -lh build/ios/ipa/

      - name: 上传未签名IPA文件
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-hikari-novel-ipa-flutter3.38.7
          path: build/ios/ipa/*.ipa
          retention-days: 30
