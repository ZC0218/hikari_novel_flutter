name: Build iOS IPA (Unsigned)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🧰 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.7'

      # ❗ 强制修复插件版本（关键！！）
      - name: 🔧 Fix device_info_plus version
        run: |
          sed -i '' '/device_info_plus/d' pubspec.yaml
          echo "device_info_plus: 10.1.0" >> pubspec.yaml

      # ❗ 清理旧缓存（必须）
      - name: 🧹 Clean Flutter
        run: flutter clean

      - name: 📦 Install dependencies
        run: flutter pub get

      # ❗ 删除 Pods（避免旧编译缓存）
      - name: 🧹 Clean iOS Pods
        run: |
          rm -rf ios/Pods
          rm -rf ios/Podfile.lock

      - name: 🔧 Install Pods
        run: |
          cd ios
          pod repo update
          pod install
          cd ..

      # 🚀 构建
      - name: 🚀 Build iOS (no codesign)
        run: flutter build ios --release --no-codesign

      # 📦 打包 IPA
      - name: 📦 Create IPA
        run: |
          mkdir Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r app.ipa Payload

      - name: 📤 Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-ipa
          path: app.ipa
