name: Build Unsigned IPA (Flutter 3.38.7)
run-name: 编译无签名IPA | Flutter 3.38.7 Stable
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build_ios_unsigned:
    runs-on: macos-latest
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 安装 Flutter 3.38.7 Stable
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.7'
          channel: stable
          cache: true

      - name: 自动切换Xcode 16
        run: |
          XCODE_PATH=$(find /Applications -name "Xcode*.app" -maxdepth 1 | grep -E "Xcode.*16" | head -1)
          if [ -z "$XCODE_PATH" ]; then
            echo "未找到Xcode16，使用系统默认Xcode"
          else
            sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
            echo "已切换至 $XCODE_PATH"
          fi
          xcodebuild -version

      - name: Flutter环境校验
        run: flutter doctor -v

      - name: 清理项目缓存
        run: flutter clean

      - name: 拉取pub依赖
        run: flutter pub get

      - name: 修正Pod最低iOS部署版本为13.0（解决版本9.0报错）
        run: |
          cd ios
          # 修改Podfile全局最低版本
          sed -i '' 's/platform :ios, .*/platform :ios, "13.0"/' Podfile
          pod repo update
          pod install --verbose

      # Xcode编译，全量关闭签名/Team校验
      - name: Xcode编译无签名真机App
        run: |
          cd ios
          xcodebuild \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -destination generic/platform=iOS \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            IPHONEOS_DEPLOYMENT_TARGET=13.0 \
            build

      # 手动组装标准无签名IPA
      - name: 打包IPA
        run: |
          mkdir -p build/ios/tmp/Payload
          cp -r ios/build/Release-iphoneos/Runner.app build/ios/tmp/Payload/
          cd build/ios/tmp
          zip -qr unsigned-hikari-novel.ipa Payload
          mkdir -p ../ipa
          mv unsigned-hikari-novel.ipa ../ipa/
          cd ../../../

      - name: 查看生成IPA文件
        run: ls -lh build/ios/ipa/

      - name: 上传未签名IPA文件
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-hikari-novel-ipa-flutter3.38.7
          path: build/ios/ipa/*.ipa
          retention-days: 30
