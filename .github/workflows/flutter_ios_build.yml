name: Build Unsigned IPA (Flutter 3.38.7)
run-name: 编译无签名IPA | Flutter 3.38.7 Stable
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build_ios_unsigned:
    runs-on: macos-latest
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 安装 Flutter 3.38.7 Stable
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.7'
          channel: stable
          cache: true

      - name: 自动切换Xcode 16
        run: |
          XCODE_PATH=$(find /Applications -name "Xcode*.app" -maxdepth 1 | grep -E "Xcode.*16" | head -1)
          if [ -z "$XCODE_PATH" ]; then
            echo "未找到Xcode16，使用系统默认Xcode"
          else
            sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
            echo "已切换至 $XCODE_PATH"
          fi
          xcodebuild -version

      - name: Flutter环境校验
        run: flutter doctor -v

      - name: 清理项目缓存
        run: flutter clean

      - name: 拉取pub依赖
        run: flutter pub get

      # 核心修复1：修改Podfile，统一所有Pod的部署版本+Swift版本，增加post_install容错
      - name: 修正Podfile配置并安装依赖
        run: |
          cd ios
          
          # 修改全局最低iOS版本为13.0
          sed -i '' 's/platform :ios, .*/platform :ios, "13.0"/' Podfile
          
          # 在Podfile末尾追加post_install脚本，统一所有Pod的编译设置
          cat >> Podfile << 'EOF'

          post_install do |installer|
            installer.pods_project.targets.each do |target|
              target.build_configurations.each do |config|
                # 统一最低部署版本为13.0
                config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '13.0'
                # 统一Swift版本为5.0，兼容旧库
                config.build_settings['SWIFT_VERSION'] = '5.0'
                # 禁用警告转错误
                config.build_settings['GCC_TREAT_WARNINGS_AS_ERRORS'] = 'NO'
                config.build_settings['SWIFT_TREAT_WARNINGS_AS_ERRORS'] = 'NO'
                # 禁用签名
                config.build_settings['CODE_SIGNING_REQUIRED'] = 'NO'
                config.build_settings['CODE_SIGNING_ALLOWED'] = 'NO'
                config.build_settings['CODE_SIGN_IDENTITY'] = ''
                config.build_settings['DEVELOPMENT_TEAM'] = ''
              end
            end
          end
          EOF
          
          pod repo update
          pod install --verbose

      # 核心修复2：Xcode编译增加全量容错参数，禁用所有签名校验
      - name: Xcode编译无签名真机App
        run: |
          cd ios
          xcodebuild \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -destination generic/platform=iOS \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            IPHONEOS_DEPLOYMENT_TARGET=13.0 \
            SWIFT_VERSION=5.0 \
            GCC_TREAT_WARNINGS_AS_ERRORS=NO \
            SWIFT_TREAT_WARNINGS_AS_ERRORS=NO \
            ENABLE_BITCODE=NO \
            build

      # 手动组装标准无签名IPA
      - name: 打包IPA
        run: |
          mkdir -p build/ios/tmp/Payload
          cp -r ios/build/Release-iphoneos/Runner.app build/ios/tmp/Payload/
          cd build/ios/tmp
          zip -qr unsigned-hikari-novel.ipa Payload
          mkdir -p ../ipa
          mv unsigned-hikari-novel.ipa ../ipa/
          cd ../../../

      - name: 查看生成IPA文件
        run: ls -lh build/ios/ipa/

      - name: 上传未签名IPA文件
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-hikari-novel-ipa-flutter3.38.7
          path: build/ios/ipa/*.ipa
          retention-days: 30
