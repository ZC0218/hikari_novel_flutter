name: Build iOS IPA (Unsigned)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🧰 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.7'

      # ✅ 强制覆盖依赖（核心！！！）
      - name: 🔧 Force fix device_info_plus
        run: |
          echo "" >> pubspec.yaml
          echo "dependency_overrides:" >> pubspec.yaml
          echo "  device_info_plus: 10.1.0" >> pubspec.yaml

      # ✅ 清缓存（必须）
      - name: 🧹 Clean Flutter
        run: flutter clean

      - name: 📦 Get Packages
        run: flutter pub get

      # ✅ 确认版本（调试用，可留）
      - name: 🔍 Check device_info_plus version
        run: flutter pub deps | grep device_info_plus

      # ✅ 清理 iOS 构建缓存
      - name: 🧹 Clean iOS
        run: |
          rm -rf ios/Pods
          rm -rf ios/Podfile.lock
          rm -rf ~/Library/Developer/Xcode/DerivedData

      - name: 🔧 Install Pods
        run: |
          cd ios
          pod repo update
          pod install
          cd ..

      # 🚀 构建
      - name: 🚀 Build iOS (no codesign)
        run: flutter build ios --release --no-codesign

      # 📦 打 IPA
      - name: 📦 Create IPA
        run: |
          mkdir Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r app.ipa Payload

      - name: 📤 Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-ipa
          path: app.ipa
