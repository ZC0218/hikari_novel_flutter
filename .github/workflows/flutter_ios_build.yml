name: Build Unsigned IPA (Flutter 3.38.7)
run-name: 编译无签名IPA | Flutter 3.38.7 Stable
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: # 支持网页手动触发构建

jobs:
  build_ios_unsigned:
    runs-on: macos-latest
    steps:
      # 1. 拉取仓库全部源码
      - name: 检出仓库代码
        uses: actions/checkout@v4

      # 2. 配置对应版本Flutter（匹配作者本地3.38.7 stable）
      - name: 安装 Flutter 3.38.7 Stable
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.7'
          channel: stable
          cache: true

      # 3. 预接受Android证书，消除doctor警告
      - name: 接受Android SDK许可
        run: flutter doctor --android-licenses -y

      # 4. 校验完整Flutter环境
      - name: Flutter环境校验
        run: flutter doctor -v

      # 5. 清理缓存 + 拉取项目依赖（关键：自动生成ios/Podfile）
      - name: 清理项目缓存
        run: flutter clean

      - name: 拉取pub依赖，生成iOS工程文件
        run: flutter pub get

      # 6. 安装CocoaPods（此时Podfile已自动生成）
      - name: 安装iOS Pod依赖
        run: |
          cd ios
          pod repo update
          pod install --verbose

      # 7. 编译Release无签名IPA
      - name: 构建未签名Release IPA
        run: flutter build ipa --release --no-codesign --target-platform=ios-arm64

      # 8. 打印构建产物目录
      - name: 查看生成IPA文件
        run: ls -lh build/ios/ipa/

      # 9. 上传IPA到工作流制品
      - name: 上传未签名IPA文件
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-hikari-novel-ipa-flutter3.38.7
          path: build/ios/ipa/*.ipa
          retention-days: 30
